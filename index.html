<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project SMP | Заявки</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 30%, #2d1b4e 70%, #4a2c6e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные частицы на фоне для атмосферы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            50% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Основной контейнер */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* Аватар */
        .avatar-wrapper {
            width: 128px;
            height: 128px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #a855f7, #6366f1, #a855f7);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background-color: #0a0a0a;
        }

        /* Анимированное окно с кнопками */
        .action-window {
            background: rgba(20, 10, 30, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 24px;
            padding: 30px 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(168, 85, 247, 0.2);
            animation: windowGlow 3s ease-in-out infinite alternate;
        }

        @keyframes windowGlow {
            0% { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(168, 85, 247, 0.2); }
            100% { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 35px rgba(168, 85, 247, 0.5); }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn i {
            font-size: 22px;
        }

        /* Кнопка "Подача заявки" */
        .btn-apply {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-apply:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(124, 58, 237, 0.6);
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
        }

        /* Кнопка Discord */
        .btn-discord {
            background: linear-gradient(135deg, #5865F2, #404eed);
            color: white;
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(88, 101, 242, 0.6);
            background: linear-gradient(135deg, #7785f5, #5865F2);
        }

        /* Подпись о подлинности */
        .copyright {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copyright i {
            color: #a855f7;
            font-size: 12px;
        }

        /* ---------- СТИЛИ ДЛЯ МОДАЛЬНОГО ОКНА ЗАЯВКИ ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: rgba(15, 10, 25, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            padding: 30px 20px;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform: translateY(20px);
            transition: all 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 24px;
            background: linear-gradient(to right, #c084fc, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #c4b5fd;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Чекбокс (галочка) */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #a855f7;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-submit {
            flex: 2;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-close {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Стили для уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 16px;
            padding: 20px 25px;
            color: white;
            z-index: 200;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 380px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 18px;
            color: #c084fc;
        }

        .notification-header i {
            font-size: 24px;
        }

        .notification-body {
            font-size: 14px;
            line-height: 1.6;
            color: #d1d5db;
        }

        .notification-body a {
            color: #5865F2;
            text-decoration: none;
            font-weight: bold;
        }

        .notification-body a:hover {
            text-decoration: underline;
        }

        .notification-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 20px;
            transition: color 0.3s;
        }

        .notification-close:hover {
            color: white;
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            .avatar-wrapper {
                width: 100px;
                height: 100px;
            }
            .btn {
                font-size: 16px;
                padding: 14px 20px;
            }
            .notification {
                left: 10px;
                right: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>

<!-- Фоновые частицы -->
<div class="particles" id="particles"></div>

<!-- УВЕДОМЛЕНИЕ ОБ УСПЕШНОЙ ОТПРАВКЕ -->
<div class="notification" id="notification">
    <button class="notification-close" id="notificationClose">&times;</button>
    <div class="notification-header">
        <i class="fas fa-check-circle"></i> Заявка отправлена!
    </div>
    <div class="notification-body">
        <p>✅ Ваша заявка успешно отправлена и будет рассмотрена в ближайшее время.</p>
        <p style="margin-top: 8px;">📢 <strong>Ожидайте результатов в нашем Discord-сервере:</strong></p>
        <p style="margin-top: 5px;">
            <a href="https://discord.gg/wVWm3uq9NV" target="_blank">
                <i class="fab fa-discord"></i> discord.gg/wVWm3uq9NV
            </a>
        </p>
    </div>
</div>

<!-- Главный контейнер -->
<div class="container">
    <!-- АВАТАРКА -->
    <div class="avatar-wrapper">
        <img src="https://placehold.co/400x400/2d1b4e/a855f7?text=SMP" alt="Project SMP Avatar" class="avatar">
    </div>

    <!-- АНИМИРОВАННОЕ ОКНО С КНОПКАМИ -->
    <div class="action-window">
        <div class="buttons">
            <!-- Кнопка Заявки -->
            <a href="#" class="btn btn-apply" id="openModalBtn">
                <i class="fas fa-envelope"></i> Подача заявки
            </a>
            <!-- Кнопка Дискорд -->
            <a href="https://discord.gg/wVWm3uq9NV" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Discord сервер
            </a>
        </div>
    </div>

    <!-- ПОДТВЕРЖДАЮЩАЯ ПОДПИСЬ -->
    <div class="copyright">
        <i class="fas fa-shield-alt"></i> Официальный сайт Project SMP <i class="fas fa-check-circle"></i>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДЛЯ ЗАЯВКИ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2><i class="fas fa-feather-alt"></i> Заявка на сервер</h2>
        
        <form id="applicationForm" action="https://formspree.io/f/xqevyjbo" method="POST">
            <!-- Ник в Minecraft -->
            <div class="form-group">
                <label><i class="fas fa-gamepad"></i> Ваш ник в Minecraft</label>
                <input type="text" name="Майнкрафт ник" placeholder="Введите игровой ник" required>
            </div>
            
            <!-- Ник в Discord (НОВОЕ ПОЛЕ) -->
            <div class="form-group">
                <label><i class="fab fa-discord"></i> Ваш ник в Discord</label>
                <input type="text" name="Дискорд ник" placeholder="Например: User#1234" required>
            </div>
            
            <!-- Возраст -->
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Возраст (лет)</label>
                <input type="number" name="Возраст" placeholder="Сколько вам лет?" min="10" max="99" required>
            </div>
            
            <!-- Откуда узнал -->
            <div class="form-group">
                <label><i class="fas fa-search"></i> Откуда вы узнали о сервере?</label>
                <input type="text" name="Источник" placeholder="YouTube, друзья, мониторинг..." required>
            </div>
            
            <!-- Планы на сервере -->
            <div class="form-group">
                <label><i class="fas fa-hammer"></i> Что вы собираетесь делать на сервере?</label>
                <textarea name="Планы" placeholder="Опишите ваши планы: строительство, торговля, PvP..."></textarea>
            </div>
            
            <!-- Галочка пиара -->
            <div class="checkbox-group">
                <input type="checkbox" id="prHelp" name="Помощь с пиаром" value="Согласен">
                <label for="prHelp"><i class="fas fa-bullhorn"></i> Я помогу с пиаром сервера</label>
            </div>
            
            <input type="hidden" name="_subject" value="Новая заявка с сайта Project SMP!">
            
            <div class="modal-buttons">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Отправить
                </button>
                <button type="button" class="btn-close" id="closeModalBtn">
                    Отмена
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Создание частиц
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 10 + 5;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particlesContainer.appendChild(particle);
    }

    // DOM-элементы
    const modalOverlay = document.getElementById('modalOverlay');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const form = document.getElementById('applicationForm');
    const notification = document.getElementById('notification');
    const notificationClose = document.getElementById('notificationClose');

    // Открыть модальное окно
    openBtn.addEventListener('click', (e) => {
        e.preventDefault();
        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    });

    // Закрыть модальное окно
    closeBtn.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    });

    // Закрыть по клику на оверлей
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // Закрыть уведомление
    notificationClose.addEventListener('click', () => {
        notification.classList.remove('show');
    });

    // Автоматически скрыть уведомление через 15 секунд
    function showNotification() {
        notification.classList.add('show');
        setTimeout(() => {
            notification.classList.remove('show');
        }, 15000);
    }

    // Отправка формы
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(form);
        const submitBtn = form.querySelector('.btn-submit');
        
        // Меняем текст кнопки на время отправки
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
        submitBtn.disabled = true;
        
        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                // Показываем кастомное уведомление вместо alert
                showNotification();
                
                // Очищаем форму
                form.reset();
                
                // Закрываем модальное окно
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                alert('❌ Ошибка отправки. Попробуйте позже или напишите нам в Discord: https://discord.gg/wVWm3uq9NV');
            }
        }).catch(() => {
            alert('❌ Ошибка сети. Проверьте подключение к интернету.');
        }).finally(() => {
            // Возвращаем кнопку в исходное состояние
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        });
    });

    // Закрытие модального окна по клавише Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
</script>
</body>
</html>
